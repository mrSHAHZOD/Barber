version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: barber_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - barber

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: barber_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - barber

  mysql:
    image: mysql:8.4
    container_name: barber_mysql
    restart: always
    environment:
      MYSQL_DATABASE: barber
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: barber
      MYSQL_PASSWORD: barber
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - barber

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: barber_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - barber

volumes:
  mysql_data:

networks:
  barber: